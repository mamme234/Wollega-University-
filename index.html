<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wollega University | Ultra Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f8fafc; }
    .glass-nav { backdrop-filter: blur(12px); background: rgba(255,255,255,0.85); }
    .gradient-text { background: linear-gradient(135deg, #1e3c72, #2b7a4b); background-clip: text; -webkit-background-clip: text; color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React & Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>

  <script type="text/babel">
    // --- React Components ---
    const Navbar = () => (
      <nav className="glass-nav fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center border-b border-gray-200">
        <div>
          <h1 className="text-2xl font-extrabold gradient-text">Wollega University</h1>
          <p className="text-xs text-gray-600">Ultra Edition | Excellence in Ethiopia</p>
        </div>
        <ul className="flex gap-6 font-semibold text-gray-700">
          <li><a href="#" className="hover:text-green-700">Home</a></li>
          <li><a href="#" className="hover:text-green-700">Academics</a></li>
          <li><a href="#" className="hover:text-green-700">Research</a></li>
          <li><a href="#" className="hover:text-green-700">Contact</a></li>
        </ul>
      </nav>
    );

    const Hero = () => (
      <section className="min-h-screen pt-24 bg-gradient-to-br from-blue-50 to-gray-100 flex items-center">
        <div className="max-w-6xl mx-auto px-6 flex flex-wrap items-center gap-8">
          <div className="flex-1">
            <span className="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm">✨ Ultra Vision 2030</span>
            <h1 className="text-5xl md:text-6xl font-extrabold mt-4 gradient-text">Shape Tomorrow <br/>With Excellence</h1>
            <p className="text-gray-600 text-lg mt-4 max-w-md">World‑class education, research, and community impact.</p>
            <a href="#" className="inline-block mt-6 bg-gray-900 text-white px-6 py-3 rounded-full font-semibold hover:bg-green-800 transition">Apply Now →</a>
          </div>
          <div className="flex-1">
            <img src="https://placehold.co/600x400/eef2ff/2b7a4b?text=Campus+Ultra" alt="Campus" className="rounded-2xl shadow-xl" />
          </div>
        </div>
      </section>
    );

    const NewsSection = () => {
      const [news, setNews] = React.useState([]);
      const [loading, setLoading] = React.useState(true);

      React.useEffect(() => {
        axios.get('/api/news')
          .then(res => { setNews(res.data); setLoading(false); })
          .catch(err => { console.error(err); setLoading(false); });
      }, []);

      if (loading) return <div className="text-center py-12">Loading latest news...</div>;

      return (
        <section className="py-16 px-6 max-w-6xl mx-auto">
          <h2 className="text-3xl font-bold text-center mb-10">📰 Latest News</h2>
          <div className="grid md:grid-cols-3 gap-6">
            {news.map(item => (
              <div key={item._id} className="bg-white rounded-2xl p-5 shadow-md border border-gray-100 hover:shadow-lg transition">
                <h3 className="text-xl font-semibold">{item.title}</h3>
                <p className="text-gray-600 mt-2">{item.summary || item.title}</p>
                <small className="text-green-700 block mt-3">{new Date(item.date).toLocaleDateString()}</small>
              </div>
            ))}
          </div>
        </section>
      );
    };

    const Footer = () => (
      <footer className="bg-gray-900 text-gray-300 py-10 text-center mt-12">
        <p>📍 Nekemte, Ethiopia | 📞 +251-57-661-1234 | ✉️ info@wollegauniversity.edu.et</p>
        <p className="mt-2 text-sm">© 2026 Wollega University – Ultra Edition | Powered by MongoDB + React</p>
      </footer>
    );

    const App = () => (
      <>
        <Navbar />
        <Hero />
        <NewsSection />
        <Footer />
      </>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
  </html>
